<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F7F8FC;color:#1C1C2E;height:100vh;overflow:hidden;display:flex}
#sidebar{width:260px;min-width:260px;background:#fff;display:flex;flex-direction:column;height:100vh;border-right:1px solid #E5E7EB;transition:width .2s ease,min-width .2s ease}
#sidebar.collapsed{width:0;min-width:0;overflow:hidden;border-right:none}
#sb-toggle{background:none;border:none;border-radius:6px;color:#6B7280;font-size:16px;cursor:pointer;padding:4px 6px;line-height:1;transition:background .15s,color .15s;flex-shrink:0}
#sb-toggle:hover{background:#F3F4F6;color:#111827}
.sb-head{padding:14px 14px 12px;border-bottom:1px solid #F3F4F6;display:flex;align-items:center;justify-content:space-between;gap:8px}
.sb-logo{font-size:15px;font-weight:700;color:#111827;display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.sb-logo-icon{width:28px;height:28px;background:#111827;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;flex-shrink:0}
.sb-dot{display:none}
.sb-sub{display:none}
.sync-row{display:none}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4B5563;flex-shrink:0;transition:background .3s}
.sync-dot.live{background:#22c55e}.sync-dot.err{background:#ef4444}
.sync-lbl{font-size:11px;color:#6B7280}
.sb-nav{padding:8px 8px 4px}
.sb-nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;font-size:13px;color:#374151;border-radius:6px;cursor:pointer;transition:background .1s,color .1s;user-select:none}
.sb-nav-item:hover{background:#F3F4F6;color:#111827}
.sb-nav-item.active{background:#EEF2FF;color:#4F46E5;font-weight:500;box-shadow:inset 3px 0 0 #4F46E5}
.sb-nav-item .sni{font-size:15px;flex-shrink:0;width:18px;text-align:center}
.sb-lbl-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 4px}
.sb-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:#9CA3AF;font-weight:600}
.sb-lbl-add{background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:18px;padding:1px 5px;border-radius:4px;line-height:1;font-family:inherit;transition:color .1s,background .1s}
.sb-lbl-add:hover{background:#F3F4F6;color:#374151}
.sb-scroll{flex:1;overflow-y:auto;padding:4px 0}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:2px}
.sb-foot{padding:8px 8px 12px;border-top:1px solid #F3F4F6;display:flex;flex-direction:column;gap:1px}
.sb-btn{display:none}
.sb-btn.plain{display:none}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;margin-top:6px;cursor:default}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:#E5E7EB;color:#374151;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-user-name{font-size:13px;font-weight:600;color:#111827}
.sb-user-role{font-size:11px;color:#9CA3AF}
.ti{display:flex;align-items:center;gap:5px;padding:6px 8px 6px calc(10px + var(--d,0)*16px);cursor:pointer;font-size:13px;color:#374151;border-radius:6px;margin:1px 8px;user-select:none;transition:background .1s,color .1s}
.ti:hover{background:#F3F4F6;color:#111827}.ti.on{background:#EEF2FF;color:#4F46E5;font-weight:500;box-shadow:inset 3px 0 0 #4F46E5}
.ti .ic{font-size:13px;flex-shrink:0}.ti .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ti .lk{font-size:10px;flex-shrink:0;opacity:.6}
.ti .cv{font-size:10px;opacity:.4;width:14px;text-align:center;transition:transform .15s;flex-shrink:0;color:#9CA3AF}
.ti .cv.op{transform:rotate(90deg)}
.ti .mb{opacity:0;background:none;border:none;cursor:pointer;font-size:14px;color:#6B7280;padding:1px 4px;border-radius:4px;font-family:inherit;flex-shrink:0;line-height:1}
.ti:hover .mb{opacity:1}.ti .mb:hover{background:#F3F4F6;color:#374151}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#fff;border-bottom:1px solid #EAECF0;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#bc{display:flex;align-items:center;gap:5px;font-size:13px;flex-wrap:wrap}
.bc-i{color:#9CA3AF;cursor:pointer;transition:color .1s}.bc-i:hover{color:#374151}
.bc-i.cur{color:#111827;font-weight:600}.bc-s{color:#D1D5DB;font-size:12px;margin:0 1px}
#ta{display:flex;gap:6px;flex-shrink:0}
.tb-divider{width:1px;height:18px;background:#E5E7EB;flex-shrink:0;margin:0 4px}
.tb-date-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:20px;font-size:12px;font-weight:500;color:#374151;white-space:nowrap}
.tb-icon-btn{background:none;border:none;cursor:pointer;font-size:15px;color:#9CA3AF;padding:6px;border-radius:6px;line-height:1;transition:background .15s,color .15s;display:flex;align-items:center;justify-content:center}
.tb-icon-btn:hover{background:#F3F4F6;color:#374151}
#ca{flex:1;overflow-y:auto;padding:24px}
#ca::-webkit-scrollbar{width:6px}
#ca::-webkit-scrollbar-thumb{background:#DDE0E8;border-radius:3px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:#6B7280;font-size:14px}
.spinner{width:32px;height:32px;border:3px solid #EAECF0;border-top-color:#534AB7;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.btn{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn.pr{background:#534AB7;color:#fff}.btn.pr:hover{background:#443CA0}
.btn.se{background:#F4F4F7;color:#374151;border:1px solid #E5E7EB}.btn.se:hover{background:#EEEEF3}
.btn.da{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}.btn.da:hover{background:#FEE2E2}
.btn.wa{background:#FFFBEB;color:#D97706;border:1px solid #FDE68A}
.btn.gr{background:#ECFDF5;color:#059669;border:1px solid #A7F3D0}.btn.gr:hover{background:#D1FAE5}
.btn.sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.home{max-width:960px}
.h-greet{font-size:34px;font-weight:800;margin-bottom:28px;letter-spacing:-.5px;color:#111827}
.h-sub{display:none}
.stats{display:none}
.stat{display:none}
.stat-n{display:none}.stat-l{display:none}
.sec-l{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:#9CA3AF;margin-bottom:0}
.home-sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.home-view-all{font-size:13px;color:#4F46E5;cursor:pointer;font-weight:500;background:none;border:none;font-family:inherit;padding:0}
.home-view-all:hover{text-decoration:underline}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.sub-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.sub-search{display:flex;align-items:center;gap:8px;padding:7px 12px;border:1px solid #E5E7EB;border-radius:8px;background:#fff;flex:1;max-width:280px}
.sub-search input{border:none;outline:none;font-family:inherit;font-size:13px;color:#374151;width:100%;background:transparent}
.sub-search input::placeholder{color:#9CA3AF}
.sub-view-btn{width:34px;height:34px;border:1px solid #E5E7EB;border-radius:7px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6B7280;transition:background .1s,color .1s;flex-shrink:0}
.sub-view-btn:hover,.sub-view-btn.on{background:#F3F4F6;color:#111827}
.fc{background:#fff;border:1px solid #EAECF0;border-radius:12px;padding:20px 18px 16px;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .15s;position:relative}
.fc:hover{border-color:#C7D2FE;box-shadow:0 2px 12px rgba(0,0,0,.06);transform:translateY(-1px)}
.fc.lkd{border-color:#FCD34D;background:#FFFBEB}.fc.lkd:hover{border-color:#F59E0B;box-shadow:0 0 0 3px rgba(245,158,11,.12)}
.fc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.fc-icon-wrap{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.fc-active-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0}
.fc-mb{opacity:0;background:#F4F4F7;border:1px solid #E5E7EB;border-radius:5px;cursor:pointer;font-size:13px;padding:3px 6px;color:#6B7280;font-family:inherit;transition:opacity .1s}
.fc:hover .fc-mb{opacity:1}.fc-mb:hover{background:#EEEEF3!important}
.fc-name{font-size:14px;font-weight:700;color:#111827;margin-bottom:4px}.fc-meta{font-size:12px;color:#9CA3AF}
.ro-list{display:flex;flex-direction:column;background:#fff;border:1px solid #EAECF0;border-radius:12px;overflow:hidden}
.ro-item{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid #F3F4F6;cursor:pointer;transition:background .1s}
.ro-item:last-child{border-bottom:none}
.ro-item:hover{background:#F9FAFB}
.ro-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ro-info{flex:1;min-width:0}
.ro-name{font-size:13px;font-weight:600;color:#111827;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ro-path{font-size:11px;color:#9CA3AF;margin-top:2px}
.ro-badge{padding:2px 9px;border-radius:5px;font-size:11px;font-weight:600;flex-shrink:0;white-space:nowrap}
.ro-time{font-size:12px;color:#9CA3AF;white-space:nowrap;flex-shrink:0;margin:0 6px}
.ro-menu{font-size:16px;color:#C4C9D4;cursor:pointer;padding:4px 6px;border-radius:4px;flex-shrink:0;background:none;border:none;font-family:inherit;line-height:1;transition:color .1s,background .1s}
.ro-menu:hover{background:#F3F4F6;color:#374151}
.add-c{background:#fff;border:1px dashed #D0D5DD;border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90px;gap:6px}
.add-c:hover{border-color:#534AB7;background:#F8F7FF}
.add-c-plus{font-size:24px;opacity:.35;color:#534AB7}.add-c-lbl{font-size:12px;color:#9CA3AF}
.starred-section{background:#fff;border:1px solid #FDE68A;border-radius:10px;padding:16px;margin-bottom:20px}
.starred-list{display:flex;flex-direction:column;gap:2px}
.si{display:flex;align-items:center;gap:10px;padding:8px 12px;background:transparent;border-radius:8px;cursor:pointer;transition:background .12s}
.si:hover{background:#F3F4F6}
.si-icon{font-size:17px;flex-shrink:0}
.si-ic-box{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.si-info{flex:1;min-width:0}
.si-name{font-size:13px;font-weight:500;color:#111827;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.si-meta{font-size:11px;color:#9CA3AF;margin-top:1px}
.si-tag{display:inline-block;font-size:11px;font-weight:500;border-radius:20px;padding:1px 8px;flex-shrink:0}
.si-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.si-act{display:flex;gap:4px;align-items:center;opacity:0;transition:opacity .15s}
.si:hover .si-act{opacity:1}
.si-act .ib{width:28px;height:28px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:6px}
.si-act .ib.del:hover{background:#FEF2F2;border-color:#FECACA;color:#EF4444}
.si-date{font-size:11px;color:#9CA3AF;flex-shrink:0;min-width:40px;text-align:right}
.si-footer{text-align:center;font-size:12px;color:#9CA3AF;font-style:italic;margin-top:24px;padding-bottom:8px}
.fv{max-width:900px}
.fv-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.fv-tr{display:flex;align-items:center;gap:12px}
.fv-icon-box{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.fv-icon{font-size:32px}.fv-name{font-size:20px;font-weight:700;color:#111827}
.fv-meta{font-size:12px;color:#9CA3AF;margin-top:3px}
.tab-bar{display:flex;border-bottom:1px solid #E5E7EB;margin-bottom:20px;gap:4px}
.tab{display:flex;align-items:center;gap:7px;padding:10px 16px;font-size:14px;font-weight:500;color:#6B7280;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.tab:hover{color:#374151}.tab.on{color:#111827;border-bottom-color:#111827;font-weight:600}
.chip{display:inline-block;padding:1px 7px;border-radius:20px;font-size:11px;font-weight:600;background:#EEF0FF;color:#534AB7;margin-left:4px}
.tab-actions{display:flex;justify-content:flex-end;margin-bottom:14px}
.search-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.search-bar input[type=text]{flex:1;min-width:0;width:auto;padding:7px 10px;border:1px solid #EAECF0;border-radius:7px;font-size:13px;font-family:inherit;outline:none;box-shadow:none}
.search-bar input[type=text]:focus{border-color:#534AB7;box-shadow:0 0 0 3px rgba(83,74,183,.1)}
.search-bar select{width:auto;padding:7px 10px;border:1px solid #EAECF0;border-radius:7px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#374151;cursor:pointer;flex-shrink:0}
.ml{display:flex;flex-direction:column;gap:6px}
.mc{background:#fff;border:1px solid #EAECF0;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.mc:hover{border-color:#D1D5DB;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.mc-title{font-size:13px;font-weight:500;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.mc-date{font-size:11px;color:#9CA3AF;white-space:nowrap;flex-shrink:0;min-width:48px;text-align:right}
.mc-prev{display:none}
.mc-top{display:none}
.mc-tags{display:none}
.tag{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;background:#EEF0FF;color:#534AB7}
.mc-actions{display:none}
.mc-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mc-act{display:flex;gap:3px;align-items:center;opacity:0;transition:opacity .15s}
.mc:hover .mc-act{opacity:1}
.star-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:2px 4px;opacity:.3;transition:all .15s;flex-shrink:0;line-height:1;color:#F59E0B}
.star-btn:hover{opacity:.7}.star-btn.on{opacity:1}
.me{max-width:780px}
.me-top{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.back-btn{background:#fff;border:1px solid #E5E7EB;border-radius:20px;padding:6px 14px;cursor:pointer;font-size:13px;font-family:inherit;color:#374151;display:flex;align-items:center;gap:6px;transition:background .12s}
.back-btn:hover{background:#F3F4F6}
.me-meta{font-size:11px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:6px}
.me-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.me-field{display:flex;flex-direction:column;gap:6px}
.me-field label{font-size:12px;color:#6B7280;font-weight:500;margin:0}
.me-field input,.me-field textarea{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:10px 14px;font-size:13px;font-family:inherit;color:#111827;outline:none;transition:border-color .15s}
.me-field input:focus,.me-field textarea:focus{border-color:#6366F1;background:#fff}
.ql-toolbar{border-radius:8px 8px 0 0!important;border-color:#EAECF0!important;background:#FAFAFA}
.ql-container{border-radius:0 0 8px 8px!important;border-color:#EAECF0!important;font-family:'Inter',sans-serif!important;font-size:14px!important}
.ql-editor{min-height:260px;line-height:1.7;color:#374151;padding:16px!important}
.ql-editor.ql-blank::before{color:#9CA3AF!important;font-style:normal!important}
.ql-editor li[data-list=checked]{text-decoration:line-through;opacity:.55}
.dl{display:flex;flex-direction:column;gap:6px}
.dc{background:#fff;border:1px solid #EAECF0;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px;transition:border-color .15s,box-shadow .15s}
.dc:hover{border-color:#D1D5DB;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.dc.lkd{border-color:#FCD34D;background:#FFFBEB}
.dc.dc-clickable{cursor:pointer}.dc.dc-clickable:hover{border-color:#534AB7;box-shadow:0 0 0 3px rgba(83,74,183,.08)}
.dc-ic{font-size:22px;flex-shrink:0}
.dc-ic-box{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dc-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0}
.dc-inf{flex:1;min-width:0}.dc-name{font-size:13px;font-weight:500;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dc-meta{font-size:11px;color:#9CA3AF;margin-top:1px}
.dc-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.dc-act{display:flex;gap:3px;align-items:center;opacity:0;transition:opacity .15s}
.dc:hover .dc-act{opacity:1}
.dc-type-badge{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;background:#F3F4F6;color:#6B7280;border-radius:4px;padding:2px 6px;flex-shrink:0}
.dc-date{font-size:11px;color:#9CA3AF;flex-shrink:0;min-width:48px;text-align:right}
.df-section-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#9CA3AF;font-weight:600;padding:4px 0 6px}
.ib{background:#F4F4F7;border:1px solid #E5E7EB;border-radius:6px;padding:5px 8px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
.ib:hover{background:#EEEEF3}
.upload-zone{border:2px dashed #D0D5DD;border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all .15s;background:#fff}
.upload-zone:hover,.upload-zone.drag{border-color:#534AB7;background:#F8F7FF}
.upload-zone-icon{font-size:32px;margin-bottom:8px;opacity:.5}
.upload-zone-text{font-size:13px;color:#6B7280}
.upload-zone-sub{font-size:11px;color:#9CA3AF;margin-top:4px}
.upload-prog{background:#EEF0FF;border-radius:6px;height:6px;margin-top:10px;overflow:hidden;display:none}
.upload-prog-bar{height:100%;background:#534AB7;border-radius:6px;transition:width .3s;width:0}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.modal.w{max-width:560px}
.m-title{font-size:16px;font-weight:700;margin-bottom:6px}
.m-sub{font-size:13px;color:#6B7280;margin-bottom:16px;line-height:1.5}
.m-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.fr{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}
input[type=text],input[type=url],input[type=date],input[type=password],textarea,select{width:100%;padding:9px 12px;border:1px solid #D0D5DD;border-radius:7px;font-family:inherit;font-size:13px;color:#1C1C2E;outline:none;transition:border-color .15s;background:#fff}
input:focus,textarea:focus,select:focus{border-color:#534AB7;box-shadow:0 0 0 3px rgba(83,74,183,.1)}
.inp-big{font-size:28px!important;font-weight:700!important;border:none!important;border-radius:0!important;padding:4px 0 12px!important;box-shadow:none!important;background:transparent!important;color:#111827!important;border-bottom:1px solid #E5E7EB!important;margin-bottom:24px!important;width:100%}
